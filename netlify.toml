[build]
  command = "pnpm install && pnpm run build"
  base = "/"
  publish = "dist"

[[plugins]]
  package = "./netlify/plugins/cache-images"

# Redirect old singular summit routes to plural (EN and ES)
[[redirects]]
  from = "/summit/:year/talk/:slug"
  to = "/summit/:year/talks/:slug"
  status = 301

[[redirects]]
  from = "/summit/:year/speaker/:slug"
  to = "/summit/:year/speakers/:slug"
  status = 301

[[redirects]]
  from = "/es/summit/:year/talk/:slug"
  to = "/es/summit/:year/talks/:slug"
  status = 301

[[redirects]]
  from = "/es/summit/:year/speaker/:slug"
  to = "/es/summit/:year/speakers/:slug"
  status = 301

[dev]
  command = "pnpm install && pnpm run build"
  base = "/"
  publish = "dist"

# Production branch (main)
[context.production]
  command = "pnpm install && pnpm run build"

# Staging branch deploy
[context.staging]
  command = "pnpm install && pnpm run build"

# Deploy previews (for PRs against staging)
[context.deploy-preview]
  command = "pnpm install && pnpm run build"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/documents/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/developers/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/blog/preview"
  [headers.values]
    Cache-Control = "private, no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/page-preview"
  [headers.values]
    Cache-Control = "private, no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/preview/page-preview"
  [headers.values]
    Cache-Control = "private, no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/developers/blog/preview"
  [headers.values]
    Cache-Control = "private, no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Robots-Tag = "noindex, nofollow"
