[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter interledger-website run build"
  base = "/"
  publish = "dist"

[dev]
[build]
  command = "pnpm install --frozen-lockfile && pnpm run build"
  base = "/"
  publish = "dist"

# Production branch (main)
[context.production]
  command = "pnpm install --frozen-lockfile && pnpm --filter interledger-website run build"

# Staging branch deploy
[context.staging]
  command = "pnpm install --frozen-lockfile && pnpm --filter interledger-website run build"

# Deploy previews (for PRs against staging)
[context.deploy-preview]
  command = "pnpm install --frozen-lockfile && pnpm --filter interledger-website run build"

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

