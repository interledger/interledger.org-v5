name: Build and Sync
# Runs on push to staging or playground only — not prod (prod has no Strapi instance, so no build or sync applies).
# Conditionally rebuilds the Strapi CMS on the self-hosted runner if cms/ changed,
# and/or syncs to Strapi when any src/content/**/*.mdx (or navigation JSON) changes.
# Does NOT trigger an Astro build — Astro is built and deployed separately via Netlify.

on:
  # Run on pushes to merge branches.
  # WARNING: Do not trigger on pull_request events. We do not want forks to run code on our self-hosted runner,
  # and pull_request events run for forks. This workflow should only run on push to staging/playground.
  push:
    branches:
      - staging
      - playground

  # Manual trigger for sync operations from either merge branch
  workflow_dispatch:

concurrency:
  # Allow staging and playground to run independently while still preventing same-branch overlap.
  group: merge-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      cms_changed: ${{ steps.detect_changes.outputs.cms_changed }}
      content_changed: ${{ steps.detect_changes.outputs.content_changed }}
      navigation_changed: ${{ steps.detect_changes.outputs.navigation_changed }}

    steps:
      - name: Validate manual trigger is on a merge branch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_BRANCH="${GITHUB_REF##*/}"
          if [ "$CURRENT_BRANCH" != "staging" ] && [ "$CURRENT_BRANCH" != "playground" ]; then
            echo "❌ Error: Manual workflow dispatch is only allowed on 'staging' or 'playground' branches"
            echo "   Current branch: $CURRENT_BRANCH"
            exit 1
          fi
          echo "✓ Manual trigger validated on $CURRENT_BRANCH branch"

      - name: Detect changed paths
        id: detect_changes
        uses: actions/github-script@v7
        with:
          script: |
            // Any MDX anywhere under Astro content collections (sync script only uploads configured roots).
            const contentPattern = /^src\/content\/.+\.mdx$/
            const navigationPattern = /^src\/config\/(?:foundation-navigation|summit-navigation)\.json$/
            const zeroSha = '0000000000000000000000000000000000000000'

            if (context.eventName === 'workflow_dispatch') {
              core.info('Manual trigger - will rebuild CMS and sync content and navigation')
              core.setOutput('cms_changed', 'true')
              core.setOutput('content_changed', 'true')
              core.setOutput('navigation_changed', 'true')
              return
            }

            const owner = context.repo.owner
            const repo = context.repo.repo
            const before = context.payload.before
            const after = context.sha

            let changedFiles = []

            if (!before || before === zeroSha) {
              core.info('No valid "before" SHA available; using push payload commits to detect changes')

              const payloadCommits = Array.isArray(context.payload.commits)
                ? context.payload.commits
                : []

              if (payloadCommits.length > 0) {
                const changedFilesSet = new Set()

                for (const commit of payloadCommits) {
                  for (const file of commit.added || []) {
                    changedFilesSet.add(file)
                  }
                  for (const file of commit.modified || []) {
                    changedFilesSet.add(file)
                  }
                  for (const file of commit.removed || []) {
                    changedFilesSet.add(file)
                  }
                }

                changedFiles = [...changedFilesSet]

                if (changedFiles.length === 0) {
                  core.info('Push payload commits found but produced no changed files; falling back to head commit files')
                }
              } else {
                core.info('No commits found in push payload; falling back to head commit files')
              }

              if (changedFiles.length === 0) {
                const commit = await github.rest.repos.getCommit({
                  owner,
                  repo,
                  ref: after
                })
                changedFiles = (commit.data.files ?? []).map((file) => file.filename)
              }
            } else {
              core.info(`Comparing commits ${before}...${after} via GitHub API`)
              try {
                const response = await github.rest.repos.compareCommitsWithBasehead({
                  owner,
                  repo,
                  basehead: `${before}...${after}`,
                  per_page: 100
                })
                const compare = response.data
                const files = compare.files ?? []

                // The compare endpoint caps the files list; it is not truly paginated.
                // If the response is truncated or reports too many files, fail safe by
                // forcing a rebuild/sync instead of risking missing relevant changes.
                const tooManyFilesFlag =
                  typeof compare.too_many_files === 'boolean'
                    ? compare.too_many_files
                    : false
                const filesLikelyTruncated = files.length >= 300

                if (tooManyFilesFlag || filesLikelyTruncated) {
                  core.warning(
                    'GitHub compareCommitsWithBasehead response may be truncated due to too many changed files; ' +
                      'treating CMS, content, and navigation as changed to avoid missing updates.'
                  )
                  core.setOutput('cms_changed', 'true')
                  core.setOutput('content_changed', 'true')
                  core.setOutput('navigation_changed', 'true')
                  return
                }

                changedFiles = files.map((file) => file.filename)
              } catch (error) {
                core.warning(
                  `Failed to compare commits ${before}...${after}: ${error}`
                )
                // On API failure, err on the side of caution and assume relevant changes occurred.
                core.setOutput('cms_changed', 'true')
                core.setOutput('content_changed', 'true')
                core.setOutput('navigation_changed', 'true')
                return
              }
            }

            changedFiles = [...new Set(changedFiles)]
            core.info(`Detected ${changedFiles.length} changed file(s) via GitHub API`)

            if (changedFiles.length === 0) {
              core.info('Changed files list is empty')
            } else {
              core.startGroup('Changed files')
              for (const file of changedFiles) {
                core.info(file)
              }
              core.endGroup()
            }

            const cmsChanged =
              changedFiles.some((file) => file.startsWith('cms/'))
            const contentChanged =
              changedFiles.some((file) => contentPattern.test(file))
            const navigationChanged =
              changedFiles.some((file) => navigationPattern.test(file))

            if (cmsChanged) {
              core.info('CMS changes detected')
            }

            if (contentChanged) {
              core.info('Content changes detected')
            }

            if (navigationChanged) {
              core.info('Navigation changes detected')
            }

            core.setOutput('cms_changed', String(cmsChanged))
            core.setOutput('content_changed', String(contentChanged))
            core.setOutput('navigation_changed', String(navigationChanged))

  rebuild-strapi:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.cms_changed == 'true'
    runs-on: strapi-vm
    environment: ${{ github.ref_name == 'playground' && 'strapi-playground' || 'strapi-staging' }}
    env:
      DEPLOY_PATH: ${{ vars.ENV_DEPLOY_PATH }}
      STRAPI_SERVICE_NAME: ${{ vars.ENV_STRAPI_SERVICE_NAME }}

    steps:
      - name: Rebuild Strapi CMS
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_PATH:-}" ]; then
            echo "Error: ENV_DEPLOY_PATH is not set for this environment."
            exit 1
          fi

          if [ -z "${STRAPI_SERVICE_NAME:-}" ]; then
            echo "Error: ENV_STRAPI_SERVICE_NAME is not set for this environment."
            exit 1
          fi

          if [ ! -d "$DEPLOY_PATH" ]; then
            echo "Error: Deploy path does not exist: $DEPLOY_PATH"
            exit 1
          fi

          source ~/.bashrc
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] || { echo "nvm not installed at $NVM_DIR"; exit 1; }
          . "$NVM_DIR/nvm.sh"
          nvm use 22
          PNPM_VERSION=10.27.0
          corepack enable
          corepack prepare pnpm@$PNPM_VERSION --activate
          pnpm --version
          test "$(pnpm --version)" = "$PNPM_VERSION"

          # Add pnpm to PATH (not loaded from .bashrc in GitHub Actions)
          export PNPM_HOME="/home/strapi/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"

          cd "$DEPLOY_PATH"

          # Ensure pull fails instead of creating merge commits
          git fetch
          git pull --ff-only

          # Defensive check: fail if git index contains unresolved conflicts
          if [ -n "$(git ls-files -u)" ]; then
            echo "Unresolved git conflicts detected after pull"
            exit 1
          fi

          # Stop the service while we rebuild
          sudo systemctl stop "$STRAPI_SERVICE_NAME"

          # Nuclear option to ensure no old dependencies or build artifacts interfere with the new build after merging changes
          rm -rf cms/node_modules
          rm -rf cms/dist
          rm -rf node_modules
          pnpm install
          cd cms
          pnpm install

          cd "$DEPLOY_PATH"
          # Rebuild with more memory to avoid OOM errors during build
          NODE_OPTIONS="--max-old-space-size=4096" pnpm run build

          cd "$DEPLOY_PATH/cms"
          NODE_OPTIONS="--max-old-space-size=4096" pnpm run build

          sudo systemctl start "$STRAPI_SERVICE_NAME"
          sleep 5
          sudo systemctl status "$STRAPI_SERVICE_NAME"

  sync-to-strapi:
    needs: [detect-changes, rebuild-strapi]
    # always() is required: if rebuild-strapi is skipped (no cms/ changes), GitHub would otherwise
    # skip this job before evaluating `if`, even when content/navigation changed.
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.rebuild-strapi.result == 'success' || needs.rebuild-strapi.result == 'skipped') &&
      (needs.detect-changes.outputs.content_changed == 'true' || needs.detect-changes.outputs.navigation_changed == 'true')
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'playground' && 'strapi-playground' || 'strapi-staging' }}
    env:
      STRAPI_URL: ${{ vars.ENV_STRAPI_URL }}
      STRAPI_API_TOKEN: ${{ secrets.ENV_STRAPI_API_TOKEN }}
      SYNC_FORCE: ${{ vars.ENV_SYNC_FORCE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Sync MDX and navigation to Strapi
        working-directory: cms
        run: |
          set -euo pipefail

          if [ -z "${STRAPI_URL:-}" ]; then
            echo "Error: ENV_STRAPI_URL is not set for this environment."
            exit 1
          fi

          if [ -z "${STRAPI_API_TOKEN:-}" ]; then
            echo "Error: ENV_STRAPI_API_TOKEN is not set for this environment."
            exit 1
          fi

          if [ "${SYNC_FORCE:-false}" = "true" ]; then
            pnpm run sync:all --force
          else
            pnpm run sync:all
          fi

  notify-slack:
    runs-on: ubuntu-latest
    needs: [detect-changes, rebuild-strapi, sync-to-strapi]
    if: ${{ always() && failure() }}
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "frontend-team",
              "text": "❌ Pipeline failed in *${{ github.repository }}*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Pipeline Failed*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Workflow:* ${{ github.workflow }}\n*Author:* ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }