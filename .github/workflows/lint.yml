name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Debug - show prettier diff on failing file
        run: |
          node_modules/.bin/prettier --version
          node_modules/.bin/prettier --write 'src/content/blog/2021-04-14-announcing-formal-launch-interledger-foundation.mdx'
          git diff src/content/blog/2021-04-14-announcing-formal-launch-interledger-foundation.mdx
          git checkout -- src/content/blog/2021-04-14-announcing-formal-launch-interledger-foundation.mdx

      - run: pnpm run lint
