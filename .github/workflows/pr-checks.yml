name: PR Checks

on:
  pull_request:
      branches:
        - staging
        - playground

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install CMS dependencies
        working-directory: cms
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run unit tests
        working-directory: cms
        run: pnpm test

  build-and-dryrun:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache optimized images
        uses: actions/cache@v4
        with:
          path: public/img/optimized
          key: optimized-images-${{ github.run_id }}
          restore-keys: |
            optimized-images-

      - name: Build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          cd cms
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Start ephemeral Strapi from this branch
        working-directory: cms
        env:
          # Throwaway secrets for a disposable, single-run instance — never
          # shared with any real Strapi deployment, so fixed values are fine.
          APP_KEYS: ci-key-1,ci-key-2,ci-key-3,ci-key-4
          API_TOKEN_SALT: ci-api-token-salt
          ADMIN_JWT_SECRET: ci-admin-jwt-secret
          TRANSFER_TOKEN_SALT: ci-transfer-token-salt
          JWT_SECRET: ci-jwt-secret
          DATABASE_FILENAME: .tmp/ci-dry-run.db
          HOST: 0.0.0.0
          PORT: 1337
          CI_API_TOKEN_OUTPUT_PATH: ${{ github.workspace }}/cms/.ci-api-token
        run: |
          rm -f "$DATABASE_FILENAME" "$CI_API_TOKEN_OUTPUT_PATH"
          nohup pnpm run start > strapi-ci.log 2>&1 &
          echo $! > strapi.pid

      - name: Wait for Strapi to become healthy
        working-directory: cms
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:1337/_health >/dev/null; then
              echo "Strapi is up."
              exit 0
            fi
            sleep 2
          done
          echo "Strapi did not become healthy in time. Logs:"
          cat strapi-ci.log
          exit 1

      - name: Run MDX sync in dry-run mode
        working-directory: cms
        env:
          STRAPI_URL: http://localhost:1337
        run: |
          if [ ! -s .ci-api-token ]; then
            echo "Error: .ci-api-token was not written by the Strapi bootstrap step."
            exit 1
          fi
          export STRAPI_API_TOKEN=$(cat .ci-api-token)
          echo "Running MDX sync in dry-run mode against an ephemeral Strapi built from this branch."
          echo "Note: since this Strapi instance starts empty (aside from bootstrap-seeded media),"
          echo "every content entry below will report as 'would create', not 'would update' — that's expected."
          pnpm run sync:mdx:dry-run

      - name: Stop ephemeral Strapi
        if: always()
        working-directory: cms
        run: |
          if [ -f strapi.pid ]; then
            kill "$(cat strapi.pid)" 2>/dev/null || true
          fi
